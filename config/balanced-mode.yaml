# Smart PDF Scanner — Balanced Mode Configuration
# Good accuracy with reasonable speed. Runs the full stage pipeline
# but without LLM enhancement.

processing:
  mode: balanced
  max_file_size_mb: 150
  parallel_pages: false
  max_workers: 4

stages:
  enabled:
    - pdf_parser
    - layout_analyzer
    - ocr_processor
    - structure_recognizer
    - table_processor
    - image_processor
    - semantic_enhancer
    - markdown_generator

ocr:
  engine: tesseract
  languages:
    - eng
  confidence_threshold: 0.7

layout:
  engine: layoutparser
  model: "lp://PubLayNet/faster_rcnn_R_50_FPN_3x/config"
  confidence_threshold: 0.7

llm:
  provider: null
  model: gpt-4-turbo
  max_tokens: 4096
  temperature: 0.1

output:
  format: markdown
  include_page_numbers: true

table:
  export_csv: false

cache:
  enabled: true

logging:
  level: INFO
  format: json
